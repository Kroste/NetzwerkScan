name: Release

# Loest aus, sobald ein Tag wie v1.0.0 gepusht wird.
# workflow_dispatch erlaubt zusaetzlich manuelles Starten zum Testen.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write   # noetig, damit der Release-Job das Release anlegen/aktualisieren darf

jobs:
  # ---------------------------------------------------------------- Windows
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Version aus Tag ableiten
        id: ver
        shell: bash
        run: echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish (win-x64, framework-dependent)
        # Framework-dependent: die .NET-Runtime wird NICHT gebundelt (~80 MB kleiner).
        # Der Installer (Setup.exe) zieht die .NET 10 Desktop Runtime bei Bedarf nach.
        # Kein PublishSingleFile: die nativen libvlc-DLLs (VideoLAN.LibVLC.Windows)
        # bleiben so verlaesslich neben der EXE. Die csproj-Bedingung greift,
        # weil dieser Job auf einem Windows-Runner laeuft.
        run: >
          dotnet publish NetScanner.csproj -c Release -r win-x64 --no-self-contained
          -p:Version=${{ steps.ver.outputs.v }} -p:DebugType=none -p:DebugSymbols=false -o publish/win

      - name: ZIP packen
        shell: pwsh
        run: Compress-Archive -Path publish/win/* -DestinationPath "NetScanner-${{ github.ref_name }}-win-x64.zip"

      # ---- Installer (Setup.exe mit eingebetteter .NET-Runtime) ----
      - name: WiX-Toolset installieren
        shell: pwsh
        # Versionen bewusst gepinnt (Tool + Extensions muessen zusammenpassen).
        run: |
          dotnet tool install --global wix --version 5.0.2
          wix extension add -g WixToolset.Bal.wixext/5.0.2
          wix extension add -g WixToolset.Netfx.wixext/5.0.2

      - name: .NET 10 Desktop Runtime laden (zum Einbetten)
        shell: pwsh
        # Stabiler aka.ms-Channel-Link -> jeweils neueste 10.0.x. Falls Microsoft den Link
        # aendert: aktuelle Direkt-URL von dotnet.microsoft.com/download/dotnet/10.0 eintragen.
        run: curl.exe -L -o windowsdesktop-runtime.exe "https://aka.ms/dotnet/10.0/windowsdesktop-runtime-win-x64.exe"

      - name: MSI bauen
        shell: pwsh
        run: wix build packaging\windows\Package.wxs -d Version=${{ steps.ver.outputs.v }} -b publish\win -o NetScanner.msi

      - name: Setup.exe (Bundle) bauen
        shell: pwsh
        run: >
          wix build packaging\windows\Bundle.wxs
          -d Version=${{ steps.ver.outputs.v }}
          -ext WixToolset.Bal.wixext -ext WixToolset.Netfx.wixext
          -o "NetScanner-${{ github.ref_name }}-Setup.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: win
          path: |
            NetScanner-*-win-x64.zip
            NetScanner-*-Setup.exe
          retention-days: 1

  # ------------------------------------------------------------------ Linux
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Version aus Tag ableiten
        id: ver
        run: echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish (linux-x64, self-contained)
        # libvlc ist hier KEINE Build-Abhaengigkeit; zur Laufzeit wird System-libvlc
        # erwartet (Paket vlc / libvlc5) — oder in der AppImage gebuendelt.
        run: >
          dotnet publish NetScanner.csproj -c Release -r linux-x64 --self-contained
          -p:Version=${{ steps.ver.outputs.v }} -p:DebugType=none -p:DebugSymbols=false -o publish/linux

      - name: Tarball packen
        run: tar -czf "NetScanner-${{ github.ref_name }}-linux-x64.tar.gz" -C publish/linux .

      - name: AppImage bauen
        run: bash packaging/linux/build-appimage.sh "${{ github.ref_name }}" publish/linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            NetScanner-*-linux-x64.tar.gz
            NetScanner-*-x86_64.AppImage
          retention-days: 1

  # ---------------------------------------------------------------- Release
  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    # Beim manuellen Start (workflow_dispatch ohne Tag) ueberspringen.
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: GitHub-Release anlegen/aktualisieren
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
