name: Release

# Loest aus, sobald ein Tag wie v1.0.0 gepusht wird.
# workflow_dispatch erlaubt zusaetzlich manuelles Starten zum Testen.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Testversion ohne fuehrendes v (z.B. 1.3.0). Nur fuer manuelle Laeufe."
        required: false
        default: "1.3.0"

permissions:
  contents: write   # noetig, damit der Release-Job das Release anlegen/aktualisieren darf

jobs:
  # ---------------------------------------------------------------- Windows
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Version aus Tag ableiten
        id: ver
        shell: bash
        run: |
          # Bei Tag-Push die Version aus dem Tag (ohne v); bei manuellem Lauf aus dem Input.
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "v=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish (win-x64, framework-dependent)
        # Framework-dependent: die .NET-Runtime wird NICHT gebundelt (~80 MB kleiner).
        # Der Installer (Setup.exe) zieht die .NET 10 Desktop Runtime bei Bedarf nach.
        # libvlc wird ebenfalls nicht gebundelt — die Kamera-Vorschau nutzt zur Laufzeit
        # eine vorhandene VLC-Installation (siehe Services/VlcLocator.cs). Das drueckt das
        # Paket von ~116 MB auf ~30 MB. Kein PublishSingleFile (NativeControlHost +
        # native Handles laufen ausgepackt am verlaesslichsten).
        run: >
          dotnet publish NetScanner.csproj -c Release -r win-x64 --no-self-contained
          -p:Version=${{ steps.ver.outputs.v }} -p:DebugType=none -p:DebugSymbols=false -o publish/win

      - name: ZIP packen
        shell: pwsh
        run: Compress-Archive -Path publish/win/* -DestinationPath "NetScanner-v${{ steps.ver.outputs.v }}-win-x64.zip"

      # ---- Installer (Setup.exe mit eingebetteter .NET-Runtime) ----
      - name: WiX-Toolset + Extensions installieren
        shell: pwsh
        run: |
          # Native Tool-Fehler sollen den Schritt abbrechen (PowerShell tut das sonst nicht).
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          dotnet tool install --global wix --version 5.*

          # Extensions EXAKT auf die installierte Tool-Version pinnen. Sonst zieht
          # 'extension add' evtl. eine inkompatible Version -> WIX0144 beim Build.
          $raw = (wix --version | Out-String).Trim()
          $wixVer = ($raw -split '[+\s]')[0]
          Write-Host "WiX-Version: '$wixVer' (roh: '$raw')"

          wix extension add -g "WixToolset.BootstrapperApplications.wixext/$wixVer"
          wix extension add -g "WixToolset.Netfx.wixext/$wixVer"
          wix extension list -g

      - name: .NET 10 Desktop Runtime laden (zum Einbetten)
        shell: pwsh
        # Stabiler aka.ms-Channel-Link -> jeweils neueste 10.0.x. Falls Microsoft den Link
        # aendert: aktuelle Direkt-URL von dotnet.microsoft.com/download/dotnet/10.0 eintragen.
        run: curl.exe -L -o windowsdesktop-runtime.exe "https://aka.ms/dotnet/10.0/windowsdesktop-runtime-win-x64.exe"

      - name: MSI bauen
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          # Absoluter Pfad -> kein Zweifel, relativ zu welchem Verzeichnis geharvestet wird.
          $pub = (Resolve-Path publish\win).Path
          Write-Host "PublishDir: $pub"
          wix build packaging\windows\Package.wxs -d Version=${{ steps.ver.outputs.v }} -d "PublishDir=$pub" -o NetScanner.msi

      - name: Setup.exe (Bundle) bauen
        shell: pwsh
        run: >
          wix build packaging\windows\Bundle.wxs
          -d Version=${{ steps.ver.outputs.v }}
          -ext WixToolset.BootstrapperApplications.wixext -ext WixToolset.Netfx.wixext
          -o "NetScanner-v${{ steps.ver.outputs.v }}-Setup.exe"

      - uses: actions/upload-artifact@v7
        with:
          name: win
          path: |
            NetScanner-*-win-x64.zip
            NetScanner-*-Setup.exe
          retention-days: 1

  # ------------------------------------------------------------------ Linux
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Version aus Tag ableiten
        id: ver
        run: |
          # Bei Tag-Push die Version aus dem Tag (ohne v); bei manuellem Lauf aus dem Input.
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "v=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish (linux-x64, self-contained)
        # libvlc ist hier KEINE Build-Abhaengigkeit; zur Laufzeit wird System-libvlc
        # erwartet (Paket vlc / libvlc5) — oder in der AppImage gebuendelt.
        run: >
          dotnet publish NetScanner.csproj -c Release -r linux-x64 --self-contained
          -p:Version=${{ steps.ver.outputs.v }} -p:DebugType=none -p:DebugSymbols=false -o publish/linux

      - name: Tarball packen
        run: tar -czf "NetScanner-v${{ steps.ver.outputs.v }}-linux-x64.tar.gz" -C publish/linux .

      - name: AppImage bauen
        run: bash packaging/linux/build-appimage.sh "v${{ steps.ver.outputs.v }}" publish/linux

      - uses: actions/upload-artifact@v7
        with:
          name: linux
          path: |
            NetScanner-*-linux-x64.tar.gz
            NetScanner-*-x86_64.AppImage
          retention-days: 1

  # ---------------------------------------------------------------- Release
  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    # Beim manuellen Start (workflow_dispatch ohne Tag) ueberspringen.
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist

      - name: GitHub-Release anlegen/aktualisieren
        uses: softprops/action-gh-release@v3
        with:
          files: dist/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
